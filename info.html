<!DOCTYPE html>
<html lang="en" class="is-loading">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVANESCENT — Info</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/info.css">
</head>
<body>
    <!-- Eye blink transition overlays -->
    <div class="blink-top" id="blink-top"></div>
    <div class="blink-bottom" id="blink-bottom"></div>

    <!-- Nav -->
    <div class="nav-gradient"></div>
    <nav class="nav">
        <a href="exhibition-space.html" class="nav__link">EXHIBITION SPACE</a>
        <a href="index.html" class="nav__logo">
            <img src="assets/brand/Evanescent_Wordmark.png" alt="Evanescent">
        </a>
        <a href="info.html" class="nav__link">INFO</a>
        <button class="nav__hamburger" id="hamburger-btn">
            <img src="assets/icons/hamburger-menu.svg" alt="Menu">
        </button>
    </nav>

    <!-- Mobile menu overlay -->
    <div class="mobile-menu" id="mobile-menu">
        <button class="mobile-menu__close" id="mobile-menu-close">
            <img src="assets/icons/cross.svg" alt="Close">
        </button>
        <a href="exhibition-space.html">EXHIBITION SPACE</a>
        <a href="info.html">INFO</a>
    </div>

    <!-- Hero video -->
    <div class="info-hero">
        <video
            class="info-hero__video"
            autoplay
            muted
            loop
            playsinline
            preload="auto"
        >
            <source src="assets/videos/evanescent-video-showreel.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Bottom info bar -->
    <div class="info-bar">
        <div class="info-bar__details">
            <div class="info-bar__detail">
                <p class="info-bar__label">Location</p>
                <p class="info-bar__value">Aotea Square | Auckland</p>
            </div>
            <div class="info-bar__detail">
                <p class="info-bar__label">Time</p>
                <p class="info-bar__value">18–31 April</p>
            </div>
            <div class="info-bar__detail">
                <p class="info-bar__label">Entry</p>
                <p class="info-bar__value">Free</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="js/info.js"></script>
    <script src="js/shared.js"></script>
</body>
</html>
