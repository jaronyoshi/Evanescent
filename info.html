<!DOCTYPE html>
<html lang="en" class="is-loading">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVANESCENT — Info</title>
    <style>
        /* ── Fonts ── */
        @font-face {
            font-family: 'Neue Montreal';
            src: url('assets/fonts/Neue Montreal/NeueMontreal-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'DaVinci';
            src: url('assets/fonts/DaVinci-Trial/TRJNDaVinci-Italic-Trial.otf') format('opentype');
            font-weight: 400;
            font-style: italic;
        }

        @font-face {
            font-family: 'DaVinci';
            src: url('assets/fonts/DaVinci-Trial/TRJNDaVinci-Regular-Trial.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }

        /* ── Reset ── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: sans-serif;
        }

        html.is-loading {
            overflow: hidden;
        }

        /* ── Eye-open transition overlays ── */
        .blink-top,
        .blink-bottom {
            position: fixed;
            left: 0;
            width: 100%;
            height: 52%;
            z-index: 9998;
            pointer-events: none;
        }

        .blink-top {
            top: 0;
            background: #000;
            transform: translateY(0%);
        }

        .blink-bottom {
            bottom: 0;
            background: #000;
            transform: translateY(0%);
        }

        /* ── Nav ── */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 40px;
            z-index: 100;
            opacity: 0;
            transform: translateY(-10px);
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            font-family: 'Neue Montreal', sans-serif;
            font-weight: 400;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .nav__logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav__logo img {
            height: 18px;
            display: block;
        }

        .nav-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            z-index: 99;
            pointer-events: none;
            opacity: 0;
            transform: translateY(-10px);
        }

        /* ── Hero video ── */
        .info-hero {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .info-hero__video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Placeholder (shown until a real video is added) */
        .info-hero__placeholder {
            width: 100%;
            height: 100%;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Neue Montreal', sans-serif;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }

        /* ── Bottom info bar ── */
        .info-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            padding: 50px 40px;
            z-index: 50;
            opacity: 0;
        }

        .info-bar__details {
            display: flex;
            justify-content: center;
            gap: 80px;
        }

        .info-bar__detail {
            text-align: center;
            width: 250px;
            white-space: nowrap;
        }

        .info-bar__label {
            font-family: 'Neue Montreal', sans-serif;
            font-weight: 400;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.7);
        }

        .info-bar__value {
            font-family: 'Neue Montreal', sans-serif;
            font-weight: 400;
            font-size: 15px;
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- Eye blink transition overlays -->
    <div class="blink-top" id="blink-top"></div>
    <div class="blink-bottom" id="blink-bottom"></div>

    <!-- Nav -->
    <div class="nav-gradient"></div>
    <nav class="nav">
        <a href="#">EXHIBITION SPACE</a>
        <a href="index.html" class="nav__logo">
            <img src="assets/brand/Evanescent_Wordmark.png" alt="Evanescent">
        </a>
        <a href="info.html">INFO</a>
    </nav>

    <!-- Hero video -->
    <div class="info-hero">
        <!-- Replace placeholder with <video> tag once the video file is added:
        <video class="info-hero__video" src="assets/videos/info-hero.mp4" autoplay muted loop playsinline></video>
        -->
        <div class="info-hero__placeholder">Video placeholder</div>
    </div>

    <!-- Bottom info bar -->
    <div class="info-bar">
        <div class="info-bar__details">
            <div class="info-bar__detail">
                <p class="info-bar__label">Location</p>
                <p class="info-bar__value">Aotea Square | Auckland</p>
            </div>
            <div class="info-bar__detail">
                <p class="info-bar__label">Time</p>
                <p class="info-bar__value">18–31 April</p>
            </div>
            <div class="info-bar__detail">
                <p class="info-bar__label">Entry</p>
                <p class="info-bar__value">Free</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
        // Eye-opening transition on page load
        (function() {
            const blinkTop = document.getElementById('blink-top');
            const blinkBottom = document.getElementById('blink-bottom');

            window.addEventListener('load', () => {
                const tl = gsap.timeline();

                // Animate gradient: solid black → soft transparent edge
                const gradientAnim = { stop: 100 };
                tl.to(gradientAnim, {
                    stop: 30,
                    duration: 0.7,
                    ease: 'power4.out',
                    onUpdate: () => {
                        blinkTop.style.background = 'linear-gradient(to bottom, #000 ' + gradientAnim.stop + '%, transparent 100%)';
                        blinkBottom.style.background = 'linear-gradient(to top, #000 ' + gradientAnim.stop + '%, transparent 100%)';
                    }
                }, 'eyeOpen');

                // Panels pull apart like eyes opening
                tl.to(blinkTop, {
                    translateY: '-100%',
                    duration: 0.9,
                    ease: 'power2.inOut'
                }, 'eyeOpen');
                tl.to(blinkBottom, {
                    translateY: '100%',
                    duration: 0.9,
                    ease: 'power2.inOut',
                    onComplete: () => {
                        blinkTop.remove();
                        blinkBottom.remove();
                        document.documentElement.classList.remove('is-loading');

                        // Nav + info bar fade in
                        gsap.to(['.nav', '.nav-gradient'], {
                            opacity: 1,
                            y: 0,
                            duration: 1.2,
                            ease: 'power2.out'
                        });
                        gsap.to('.info-bar', {
                            opacity: 1,
                            duration: 1.2,
                            ease: 'power2.out'
                        });
                    }
                }, '<');
            });
        })();
    </script>
</body>
</html>
