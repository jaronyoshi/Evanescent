<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVANESCENT</title>
    <style>
        /* ── Fonts ── */
        @font-face {
            font-family: 'Neue Montreal';
            src: url('assets/fonts/Neue Montreal/NeueMontreal-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'DaVinci';
            src: url('assets/fonts/DaVinci-Trial/TRJNDaVinci-Italic-Trial.otf') format('opentype');
            font-weight: 400;
            font-style: italic;
        }

        @font-face {
            font-family: 'DaVinci';
            src: url('assets/fonts/DaVinci-Trial/TRJNDaVinci-Regular-Trial.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }

        /* ── Reset ── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background: #000;
            color: #fff;
            font-family: sans-serif;
        }

        /* ── Nav ── */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 40px;
            z-index: 100;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            font-family: 'Neue Montreal', sans-serif;
            font-weight: 400;
            font-size: 16px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .nav__logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav__logo img {
            height: 18px;
            display: block;
        }

        .nav-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            z-index: 99;
            pointer-events: none;
        }

        /* ── Hero / Scrollytelling ── */
        .hero {
            position: relative;
            height: 600vh; /* scroll runway */
        }

        .hero__sticky {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .hero__image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            will-change: transform;
        }
        /* ── Hero text reveal ── */
        .hero__text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 80%;
            max-width: 800px;
        }

        .hero__heading {
            font-family: 'DaVinci', serif;
            font-style: italic;
            font-weight: 400;
            font-size: 96px;
            line-height: 1.1;
            margin-bottom: 24px;
            white-space: nowrap;
            clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
        }

        .hero__body {
            font-family: 'DaVinci', serif;
            font-weight: 400;
            font-style: normal;
            font-size: 24px;
            line-height: 1.5;
            clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
        }

        .hero__overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            opacity: 0;
            pointer-events: none;
        }
        /* ── Tablet (768px and below) ── */
        @media (max-width: 768px) {
            .nav {
                padding: 24px 24px;
            }

            .nav a {
                font-size: 13px;
            }

            .nav__logo img {
                height: 14px;
            }

            .nav-gradient {
                height: 150px;
            }

            .hero__heading {
                font-size: 64px;
            }

            .hero__body {
                font-size: 20px;
            }

            .hero__text {
                width: 88%;
            }
        }

        /* ── Mobile (480px and below) ── */
        @media (max-width: 480px) {
            .nav {
                padding: 20px 16px;
            }

            .nav a {
                font-size: 11px;
                letter-spacing: 0.05em;
            }

            .nav__logo img {
                height: 12px;
            }

            .nav-gradient {
                height: 120px;
            }

            .hero__heading {
                font-size: 40px;
            }

            .hero__body {
                font-size: 16px;
                line-height: 1.4;
            }

            .hero__text {
                width: 92%;
            }
        }
    </style>
</head>
<body>

    <!-- Nav gradient + links -->
    <div class="nav-gradient"></div>
    <nav class="nav">
        <a href="#">EXHIBITION SPACE</a>
        <a href="index.html" class="nav__logo">
            <img src="assets/brand/Evanescent_Wordmark.png" alt="Evanescent">
        </a>
        <a href="#">INFO</a>
    </nav>

    <!-- Hero – scrollytelling section -->
    <section class="hero">
        <div class="hero__sticky">
            <img class="hero__image" src="assets/images/eye-ver-1.jpg" alt="Eye">
            <div class="hero__overlay"></div>
            <div class="hero__text">
                <h1 class="hero__heading">Invisible world</h1>
                <p class="hero__body">There are many variations of passages of Lorem Ipsum available, but the majority have suffered alteration in some form, by injected humour, or randomised words which don't look even slightly believable.</p>
            </div>
        </div>
    </section>

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Zoom into the iris (centre of image) as user scrolls
        gsap.to(".hero__image", {
            scale: 5,
            ease: "none",
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                end: "bottom top",
                scrub: 1,
                pin: false // sticky CSS handles pinning
            }
        });

        // Gradual dark overlay — starts early, gets very dark
        gsap.to(".hero__overlay", {
            opacity: 0.92,
            ease: "power2.in",
            scrollTrigger: {
                trigger: ".hero",
                start: "2% top",
                end: "40% top",
                scrub: 1
            }
        });

        // Heading reveal — wipe left to right
        gsap.to(".hero__heading", {
            clipPath: "polygon(0 0, 100% 0, 100% 100%, 0 100%)",
            ease: "none",
            scrollTrigger: {
                trigger: ".hero",
                start: "35% top",
                end: "50% top",
                scrub: 1
            }
        });

        // Body text reveal — wipe left to right, after heading
        gsap.to(".hero__body", {
            clipPath: "polygon(0 0, 100% 0, 100% 100%, 0 100%)",
            ease: "none",
            scrollTrigger: {
                trigger: ".hero",
                start: "50% top",
                end: "65% top",
                scrub: 1
            }
        });

        // Fade out the nav + gradient on scroll
        gsap.to([".nav", ".nav-gradient"], {
            opacity: 0,
            ease: "none",
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                end: "15% top",
                scrub: 1
            }
        });
    </script>

</body>
</html>
