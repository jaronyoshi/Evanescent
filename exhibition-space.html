<!DOCTYPE html>
<html lang="en" class="is-loading">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVANESCENT — Exhibition Space</title>
    <style>
        /* ── Fonts ── */
        @font-face {
            font-family: 'Neue Montreal';
            src: url('assets/fonts/Neue Montreal/NeueMontreal-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }

        /* ── Reset ── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: sans-serif;
        }

        html.is-loading {
            overflow: hidden;
        }

        /* ── Eye-open transition overlays ── */
        .blink-top,
        .blink-bottom {
            position: fixed;
            left: 0;
            width: 100%;
            height: 52%;
            z-index: 9998;
            pointer-events: none;
        }

        .blink-top {
            top: 0;
            background: #000;
            transform: translateY(0%);
        }

        .blink-bottom {
            bottom: 0;
            background: #000;
            transform: translateY(0%);
        }

        /* ── Nav ── */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 40px;
            z-index: 100;
            opacity: 0;
            transform: translateY(-10px);
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            font-family: 'Neue Montreal', sans-serif;
            font-weight: 400;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .nav__logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav__logo img {
            height: 18px;
            display: block;
        }

        .nav__hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            width: 24px;
            height: 24px;
        }

        .nav__hamburger img {
            width: 24px;
            height: 24px;
            display: block;
        }

        .mobile-menu {
            display: none;
        }

        .nav-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            z-index: 99;
            pointer-events: none;
            opacity: 0;
            transform: translateY(-10px);
        }

        /* ── Enter button ── */
        .enter-btn {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            opacity: 0;
        }

        .enter-btn a {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            font-family: 'Neue Montreal', sans-serif;
            font-weight: 400;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 14px 32px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 30px;
            transition: border-color 0.3s ease, background 0.3s ease;
        }

        .enter-btn a:hover {
            border-color: #fff;
            background: rgba(255,255,255,0.08);
        }

        /* ── Tablet (1024px and below) ── */
        @media (max-width: 1024px) {
            .nav {
                padding: 24px 32px;
            }

            .nav-gradient {
                height: 160px;
            }
        }

        /* ── Tablet portrait (768px and below) ── */
        @media (max-width: 768px) {
            .nav {
                padding: 22px 24px;
            }

            .nav a {
                font-size: 11px;
            }

            .nav__logo img {
                height: 14px;
            }

            .nav-gradient {
                height: 140px;
            }
        }

        /* ── Mobile (480px and below) ── */
        @media (max-width: 480px) {
            .nav {
                padding: 18px 16px;
            }

            .nav a.nav__link {
                display: none;
            }

            .nav__hamburger {
                display: block;
                margin-left: auto;
                width: 32px;
                height: 32px;
            }

            .nav__hamburger img {
                width: 32px;
                height: 32px;
            }

            .nav__logo img {
                height: 20px;
            }

            .nav-gradient {
                height: 100px;
            }

            .mobile-menu {
                position: fixed;
                top: 0;
                right: 0;
                width: 75%;
                height: 100%;
                background: #000;
                z-index: 200;
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                justify-content: flex-start;
                padding-right: 40px;
                padding-top: 120px;
                gap: 32px;
                transform: translateX(100%);
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .mobile-menu.is-open {
                transform: translateX(0);
            }

            .mobile-menu a {
                color: #fff;
                text-decoration: none;
                font-family: 'Neue Montreal', sans-serif;
                font-weight: 400;
                font-size: 24px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            .mobile-menu__close {
                position: absolute;
                top: 18px;
                right: 16px;
                background: none;
                border: none;
                cursor: pointer;
                padding: 0;
                width: 32px;
                height: 32px;
            }

            .mobile-menu__close img {
                width: 32px;
                height: 32px;
                display: block;
            }

            .enter-btn {
                bottom: 40px;
            }

            .enter-btn a {
                font-size: 11px;
                padding: 12px 28px;
            }
        }
    </style>
</head>
<body>
    <!-- Eye blink transition overlays -->
    <div class="blink-top" id="blink-top"></div>
    <div class="blink-bottom" id="blink-bottom"></div>

    <!-- Nav -->
    <div class="nav-gradient"></div>
    <nav class="nav">
        <a href="exhibition-space.html" class="nav__link">EXHIBITION SPACE</a>
        <a href="index.html" class="nav__logo">
            <img src="assets/brand/Evanescent_Wordmark.png" alt="Evanescent">
        </a>
        <a href="info.html" class="nav__link">INFO</a>
        <button class="nav__hamburger" id="hamburger-btn">
            <img src="assets/icons/hamburger-menu.svg" alt="Menu">
        </button>
    </nav>

    <!-- Mobile menu overlay -->
    <div class="mobile-menu" id="mobile-menu">
        <button class="mobile-menu__close" id="mobile-menu-close">
            <img src="assets/icons/cross.svg" alt="Close">
        </button>
        <a href="exhibition-space.html">EXHIBITION SPACE</a>
        <a href="info.html">INFO</a>
    </div>

    <!-- Enter 3D Space button -->
    <div class="enter-btn">
        <a href="3d-space.html">ENTER 3D SPACE</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
        (function() {
            const blinkTop = document.getElementById('blink-top');
            const blinkBottom = document.getElementById('blink-bottom');

            sessionStorage.setItem('evanescent-visited', '1');

            window.addEventListener('load', () => {
                const tl = gsap.timeline();

                const gradientAnim = { stop: 100 };
                tl.to(gradientAnim, {
                    stop: 30,
                    duration: 0.7,
                    ease: 'power4.out',
                    onUpdate: () => {
                        blinkTop.style.background = 'linear-gradient(to bottom, #000 ' + gradientAnim.stop + '%, transparent 100%)';
                        blinkBottom.style.background = 'linear-gradient(to top, #000 ' + gradientAnim.stop + '%, transparent 100%)';
                    }
                }, 'eyeOpen');

                tl.to(blinkTop, {
                    translateY: '-100%',
                    duration: 0.9,
                    ease: 'power2.inOut'
                }, 'eyeOpen');

                tl.to(blinkBottom, {
                    translateY: '100%',
                    duration: 0.9,
                    ease: 'power2.inOut',
                    onComplete: () => {
                        blinkTop.remove();
                        blinkBottom.remove();
                        document.documentElement.classList.remove('is-loading');

                        gsap.to(['.nav', '.nav-gradient'], {
                            opacity: 1,
                            y: 0,
                            duration: 1.2,
                            ease: 'power2.out'
                        });

                        gsap.to('.enter-btn', {
                            opacity: 1,
                            duration: 1.2,
                            ease: 'power2.out'
                        });
                    }
                }, '<');
            });

            // Mobile menu toggle
            const hamburgerBtn = document.getElementById('hamburger-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const mobileMenuClose = document.getElementById('mobile-menu-close');

            if (hamburgerBtn && mobileMenu && mobileMenuClose) {
                hamburgerBtn.addEventListener('click', () => {
                    mobileMenu.classList.add('is-open');
                });

                mobileMenuClose.addEventListener('click', () => {
                    mobileMenu.classList.remove('is-open');
                });
            }
        })();
    </script>
</body>
</html>
